<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Trash Panda Panic</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
    url("Background.png") center/cover no-repeat fixed;
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 15px;
  font-size: 36px;
  letter-spacing: 1px;
}

#stats {
  margin: 10px;
  font-size: 18px;
  opacity: 0.9;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 14px;
  justify-content: center;
  margin-top: 20px;
}

.hole {
  width: 110px;
  height: 110px;
  background: url("Empty.png") center/contain no-repeat;
  position: relative;
  cursor: pointer;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
  transform: scale(0.95);
}

.hole:active {
  transform: scale(0.95);
}

.panda {
  width: 95px;
  height: 95px;
  position: absolute;
  top: 8px;
  left: 8px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

/* Buttons */

button {
  background: linear-gradient(145deg, #5a5a5a, #2a2a2a);
  border: none;
  border-radius: 12px;
  padding: 12px 22px;
  margin: 6px;
  font-size: 16px;
  color: white;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: all 0.15s ease;
}

button:hover {
  background: linear-gradient(145deg, #6d6d6d, #3a3a3a);
  transform: translateY(-2px);
}

button:active {
  transform: scale(0.95);
  box-shadow: 0 2px 5px rgba(0,0,0,0.6);
}

/* Game Over */

#gameOver {
  display: none;
  margin-top: 25px;
}

#gameOver h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

.sunglassesGlow {
  filter: hue-rotate(260deg) saturate(3) brightness(1.2);
}

.normal {
  filter: drop-shadow(0 0 10px limegreen);
}

</style>
</head>

<body>

<audio id="music" src="banjo.mp3" loop></audio>

<h1>Trash Panda Panic</h1>

<div id="stats">
Score: <span id="score">0</span> |
Misses: <span id="misses">3</span> |
High Score: <span id="highScore">0</span>
</div>

<button onclick="startGame()">Start</button>
<button onclick="resetHighScore()">Reset High Score</button>
<button onclick="toggleMusic()" id="musicBtn">Sound Off</button>

<div class="grid" id="grid"></div>

<div id="gameOver">
<h2>Game Over</h2>
<button onclick="startGame()">Play Again</button>
</div>

<audio id="bonkSound" src="bonk.mp3" preload="auto"></audio>

<script>
const grid = document.getElementById("grid");
const scoreEl = document.getElementById("score");
const missesEl = document.getElementById("misses");
const highScoreEl = document.getElementById("highScore");
const gameOverEl = document.getElementById("gameOver");

let score = 0;
let misses = 3;
let speed = 1400;
let running = false;
let activeIndex = null;
let spawnTimer;

let highScore = parseInt(localStorage.getItem("trashHigh")) || 0;
highScoreEl.textContent = highScore;

// Create holes
const holes = [];
for (let i = 0; i < 9; i++) {
  const hole = document.createElement("div");
  hole.className = "hole";
  hole.onclick = () => hitHole(i);
  hole.addEventListener('touchstart', (e) => {
    e.preventDefault();
    hitHole(i);
  });
  grid.appendChild(hole);
  holes.push(hole);
}

let musicOn = false;

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById("musicBtn");
  if (musicOn) {
    unlockAudio();
    music.play().catch(() => {});
    btn.textContent = "Sound Off";
  } else {
    music.pause();
    btn.textContent = "Sound On";
  }
}

function startGame() {
  if (musicOn) {
    music.currentTime = 0;
    music.play().catch(() => {});
  }
  score = 0;
  misses = 3;
  speed = 1400;
  running = true;
  gameOverEl.style.display = "none";
  updateUI();
  loop();
}

function resetHighScore() {
  highScore = 0;
  localStorage.setItem("trashHigh", highScore);
  highScoreEl.textContent = highScore;
}

function loop() {
  if (!running) return;

  spawnPanda();

  speed *= 0.98; // difficulty ramp
  if (speed < 250) speed = 250;

  spawnTimer = setTimeout(loop, speed);
}

function spawnPanda() {
  clearPanda();

  const index = Math.floor(Math.random() * 9);
  const hole = holes[index];

  const panda = document.createElement("div");
  panda.classList.add("panda");

  let type = "normal";
  let points = 1;

  const difficultyLevel = 1400 - speed;

  // Bonus unlocks
  if (difficultyLevel > 300 && Math.random() < 0.25) {
    type = "sunglasses";
    points = 2;
  }

  if (difficultyLevel > 600 && Math.random() < 0.15) {
    type = "golden";
    points = 3;
  }

  if (type === "normal") {
    panda.style.backgroundImage = 'url("Normal.png")';
    panda.classList.add("normal");
  }

  if (type === "sunglasses") {
    panda.style.backgroundImage = 'url("Glasses.png")';
    panda.classList.add("sunglassesGlow");
  }

  if (type === "golden") {
    panda.style.backgroundImage = 'url("Golden.png")';
  }
  panda.dataset.points = points;

  hole.appendChild(panda);
  activeIndex = index;

  setTimeout(() => {
    if (activeIndex === index) {
      miss();
    }
  }, speed * 0.9);
}

function hitHole(index) {
  if (!running) return;
  if (index !== activeIndex) return;

  const panda = holes[index].querySelector(".panda");
  if (!panda) return;

  const points = parseInt(panda.dataset.points);
  score += points;

  const sound = document.getElementById("bonkSound").cloneNode(true);
  sound.volume = musicOn ? 0.5 : 0;
  sound.play().catch(() => {});

  clearPanda();
  updateUI();
}

function miss() {
  misses--;
  clearPanda();
  updateUI();

  if (misses <= 0) {
    endGame();
  }
}

function clearPanda() {
  holes.forEach(h => h.innerHTML = "");
  activeIndex = null;
}

function updateUI() {
  scoreEl.textContent = score;
  missesEl.textContent = misses;
}

function endGame() {
  running = false;
  clearTimeout(spawnTimer);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("trashHigh", highScore);
  }

  highScoreEl.textContent = highScore;
  gameOverEl.style.display = "block";
}

function unlockAudio() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioContext();

  const buffer = ctx.createBuffer(1, 1, 22050);
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);
  source.start(0);
}

</script>

</body>
</html>
